    <style>

        .option.selected { background: #e3f2fd; border-color: #0073bb; }

        .option.incorrect { background: #f8d7da; border-color: #dc3545; }

        .btn-secondary { background: #232f3e; color: white; }
        .btn-secondary:hover { background: #131921; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }

        .results { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .score { font-size: 20px; font-weight: bold; margin: 10px 0; }
        .pass { color: #28a745; }
        .fail { color: #dc3545; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .stat-card { background: white; padding: 12px; border-radius: 4px; text-align: center; border: 2px solid #e0e0e0; }
        .stat-value { font-size: 24px; font-weight: bold; color: #232f3e; }
        .stat-label { font-size: 12px; color: #666; margin-top: 5px; }
        .hidden { display: none; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); padding: 20px; }
        .modal-content { background: white; margin: 10% auto; padding: 20px; border-radius: 8px; max-width: 500px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .modal-header { font-size: 20px; font-weight: bold; margin-bottom: 15px; text-align: center; }
        .modal-correct { color: #28a745; }
        .modal-incorrect { color: #dc3545; }
        .modal-body { margin: 15px 0; font-size: 14px; line-height: 1.6; }
        .modal-footer { text-align: center; margin-top: 15px; }
        .modal-btn { padding: 10px 24px; background: #ff9900; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .modal-btn:hover { background: #ec7211; }
        @media (min-width: 768px) {

            .flag-btn { padding: 8px 16px; font-size: 14px; }

            .modal-header { font-size: 24px; margin-bottom: 20px; }
            .modal-body { font-size: 16px; margin: 20px 0; }
            .modal-footer { margin-top: 20px; }
            .modal-btn { padding: 12px 30px; font-size: 16px; }
        }
    </style>

    <script>
        const questions = [{"num":"1","text":"Under the AWS shared responsibility model, which of the following is an example of security in the AWS Cloud?","options":[{"letter":"A","text":"Managing edge locations"},{"letter":"B","text":"Physical security"},{"letter":"C","text":"Firewall configuration"},{"letter":"D","text":"Global infrastructure"}],"correct":[]},{"num":"2","text":"How can an AWS user with an AWS Basic Support plan obtain technical assistance from AWS?","options":[{"letter":"A","text":"AWS Senior Support Engineers"},{"letter":"B","text":"AWS Technical Account Managers"},{"letter":"C","text":"AWS Trusted Advisor"},{"letter":"D","text":"AWS Discussion Forums"}],"correct":[]},{"num":"3","text":"Which of the following are pillars of the AWS Well-Architected Framework? (Choose two.)","options":[{"letter":"A","text":"Multiple Availability Zones"},{"letter":"B","text":"Performance efficiency"},{"letter":"C","text":"Security"},{"letter":"D","text":"Encryption usage"},{"letter":"E","text":"High availability"}],"correct":[]},{"num":"4","text":"After selecting an Amazon EC2 Dedicated Host reservation, which pricing option would provide the largest discount?","options":[{"letter":"A","text":"No upfront payment"},{"letter":"B","text":"Hourly on-demand payment"},{"letter":"C","text":"Partial upfront payment"},{"letter":"D","text":"All upfront payment"}],"correct":[]},{"num":"5","text":"What is an advantage of deploying an application across multiple Availability Zones?","options":[{"letter":"A","text":"There is a lower risk of service failure if a natural disaster causes a service disruption in a given AWS Region."},{"letter":"B","text":"The application will have higher availability because it can withstand a service disruption in one Availability Zone."},{"letter":"C","text":"There will be better coverage as Availability Zones are geographically distant and can serve a wider area."},{"letter":"D","text":"There will be decreased application latency that will improve the user experience."}],"correct":[]},{"num":"6","text":"A Cloud Practitioner is asked how to estimate the cost of using a new application on AWS. <br/> What is the MOST appropriate response?","options":[{"letter":"A","text":"Inform the user that AWS pricing allows for on-demand pricing."},{"letter":"B","text":"Direct the user to the AWS Simple Monthly Calculator for an estimate."},{"letter":"C","text":"Use Amazon QuickSight to analyze current spending on-premises."},{"letter":"D","text":"Use Amazon AppStream 2.0 for real-time pricing analytics."}],"correct":[]},{"num":"7","text":"A company wants to migrate its applications to a VPC on AWS. These applications will need to access on-premises resources. <br/> What combination of actions will enable the company to accomplish this goal? (Choose two.)","options":[{"letter":"A","text":"Use the AWS Service Catalog to identify a list of on-premises resources that can be migrated."},{"letter":"B","text":"Build a VPN connection between an on-premises device and a virtual private gateway in the new VPC."},{"letter":"C","text":"Use Amazon Athena to query data from the on-premises database servers."},{"letter":"D","text":"Connect the company's on-premises data center to AWS using AWS Direct Connect."},{"letter":"E","text":"Leverage Amazon CloudFront to restrict access to static web content provided through the company's on-premises web servers."}],"correct":[]},{"num":"8","text":"A web application running on AWS has been spammed with malicious requests from a recurring set of IP addresses. <br/> Which AWS service can help secure the application and block the malicious traffic?","options":[{"letter":"A","text":"AWS IAM"},{"letter":"B","text":"Amazon GuardDuty"},{"letter":"C","text":"Amazon Simple Notification Service (Amazon SNS)"},{"letter":"D","text":"AWS WAF"}],"correct":[]},{"num":"9","text":"Treating infrastructure as code in the AWS Cloud allows users to:","options":[{"letter":"A","text":"automate migration of on-premises hardware to AWS data centers."},{"letter":"B","text":"let a third party automate an audit of the AWS infrastructure."},{"letter":"C","text":"turn over application code to AWS so it can run on the AWS infrastructure."},{"letter":"D","text":"automate the infrastructure provisioning process."}],"correct":[]},{"num":"10","text":"A company requires a dedicated network connection between its on-premises servers and the AWS Cloud. <br/> Which AWS service should be used?","options":[{"letter":"A","text":"AWS VPN"},{"letter":"B","text":"AWS Direct Connect"},{"letter":"C","text":"Amazon API Gateway"},{"letter":"D","text":"Amazon Connect"}],"correct":[]},{"num":"11","text":"Which AWS service can be used to query stored datasets directly from Amazon S3 using standard SQL?","options":[{"letter":"A","text":"AWS Glue"},{"letter":"B","text":"AWS Data Pipeline"},{"letter":"C","text":"Amazon CloudSearch"},{"letter":"D","text":"Amazon Athena"}],"correct":[]},{"num":"12","text":"AWS CloudFormation is designed to help the user:","options":[{"letter":"A","text":"model and provision resources."},{"letter":"B","text":"update application code."},{"letter":"C","text":"set up data lakes."},{"letter":"D","text":"create reports for billing."}],"correct":[]},{"num":"13","text":"Which of the following is an AWS database service?","options":[{"letter":"A","text":"Amazon Redshift"},{"letter":"B","text":"Amazon Elastic Block Store (Amazon EBS)"},{"letter":"C","text":"Amazon S3 Glacier"},{"letter":"D","text":"AWS Snowball"}],"correct":[]},{"num":"14","text":"A Cloud Practitioner must determine if any security groups in an AWS account have been provisioned to allow unrestricted access for specific ports. <br/> What is the SIMPLEST way to do this?","options":[{"letter":"A","text":"Review the inbound rules for each security group in the Amazon EC2 management console to check for port 0.0.0.0/0."},{"letter":"B","text":"Run AWS Trusted Advisor and review the findings."},{"letter":"C","text":"Open the AWS IAM console and check the inbound rule filters for open access."},{"letter":"D","text":"In AWS Config, create a custom rule that invokes an AWS Lambda function to review rules for inbound access."}],"correct":[]},{"num":"15","text":"What are the benefits of developing and running a new application in the AWS Cloud compared to on-premises? (Choose two.)","options":[{"letter":"A","text":"AWS automatically distributes the data globally for higher durability."},{"letter":"B","text":"AWS will take care of operating the application."},{"letter":"C","text":"AWS makes it easy to architect for high availability."},{"letter":"D","text":"AWS can easily accommodate application demand changes."},{"letter":"E","text":"AWS takes care application security patching."}],"correct":[]},{"num":"16","text":"A user needs an automated security assessment report that will identify unintended network access to Amazon EC2 instances and vulnerabilities on those instances. <br/> Which AWS service will provide this assessment report?","options":[{"letter":"A","text":"EC2 security groups"},{"letter":"B","text":"AWS Config"},{"letter":"C","text":"Amazon Macie"},{"letter":"D","text":"Amazon Inspector"}],"correct":[]},{"num":"17","text":"How can a company isolate the costs of production and non-production workloads on AWS?","options":[{"letter":"A","text":"Create Identity and Access Management (IAM) roles for production and non-production workloads."},{"letter":"B","text":"Use different accounts for production and non-production expenses."},{"letter":"C","text":"Use Amazon EC2 for non-production workloads and other services for production workloads."},{"letter":"D","text":"Use Amazon CloudWatch to monitor the use of services."}],"correct":[]},{"num":"18","text":"Where can users find a catalog of AWS-recognized providers of third-party security solutions?","options":[{"letter":"A","text":"AWS Service Catalog"},{"letter":"B","text":"AWS Marketplace"},{"letter":"C","text":"AWS Quick Start"},{"letter":"D","text":"AWS CodeDeploy"}],"correct":[]},{"num":"19","text":"A Cloud Practitioner needs to store data for 7 years to meet regulatory requirements. <br/> Which AWS service will meet this requirement at the LOWEST cost?","options":[{"letter":"A","text":"Amazon S3"},{"letter":"B","text":"AWS Snowball"},{"letter":"C","text":"Amazon Redshift"},{"letter":"D","text":"Amazon S3 Glacier"}],"correct":[]},{"num":"20","text":"What are the immediate benefits of using the AWS Cloud? (Choose two.)","options":[{"letter":"A","text":"Increased IT staff."},{"letter":"B","text":"Capital expenses are replaced with variable expenses."},{"letter":"C","text":"User control of infrastructure."},{"letter":"D","text":"Increased agility."},{"letter":"E","text":"AWS holds responsibility for security in the cloud."}],"correct":[]},{"num":"21","text":"Which security service automatically recognizes and classifies sensitive data or intellectual property on AWS?","options":[{"letter":"A","text":"Amazon GuardDuty"},{"letter":"B","text":"Amazon Macie"},{"letter":"C","text":"Amazon Inspector"},{"letter":"D","text":"AWS Shield"}],"correct":[]},{"num":"22","text":"What is the purpose of AWS Storage Gateway?","options":[{"letter":"A","text":"It ensures on-premises data storage is 99.999999999% durable."},{"letter":"B","text":"It transports petabytes of data to and from AWS."},{"letter":"C","text":"It connects to multiple Amazon EC2 instances."},{"letter":"D","text":"It connects on-premises data storage to the AWS Cloud."}],"correct":[]},{"num":"23","text":"What should users do if they want to install an application in geographically isolated locations?","options":[{"letter":"A","text":"Install the application using multiple internet gateways."},{"letter":"B","text":"Deploy the application to an Amazon VPC."},{"letter":"C","text":"Deploy the application to multiple AWS Regions."},{"letter":"D","text":"Configure the application using multiple NAT gateways."}],"correct":[]},{"num":"24","text":"A system in the AWS Cloud is designed to withstand the failure of one or more components. <br/> What is this an example of?","options":[{"letter":"A","text":"Elasticity"},{"letter":"B","text":"High Availability"},{"letter":"C","text":"Scalability"},{"letter":"D","text":"Agility"}],"correct":[]},{"num":"25","text":"A Cloud Practitioner needs a consistent and dedicated connection between AWS resources and an on-premises system. <br/> Which AWS service can fulfill this requirement?","options":[{"letter":"A","text":"AWS Direct Connect"},{"letter":"B","text":"AWS VPN"},{"letter":"C","text":"Amazon Connect"},{"letter":"D","text":"AWS Data Pipeline"}],"correct":[]},{"num":"26","text":"Within the AWS shared responsibility model, who is responsible for security and compliance?","options":[{"letter":"A","text":"The customer is responsible."},{"letter":"B","text":"AWS is responsible."},{"letter":"C","text":"AWS and the customer share responsibility."},{"letter":"D","text":"AWS shares responsibility with the relevant governing body."}],"correct":[]},{"num":"27","text":"To use the AWS CLI, users are required to generate:","options":[{"letter":"A","text":"a password policy."},{"letter":"B","text":"an access/secret key."},{"letter":"C","text":"a managed policy."},{"letter":"D","text":"an API key."}],"correct":[]},{"num":"28","text":"Which AWS service is used to provide encryption for Amazon EBS?","options":[{"letter":"A","text":"AWS Certificate Manager"},{"letter":"B","text":"AWS Systems Manager"},{"letter":"C","text":"AWS KMS"},{"letter":"D","text":"AWS Config"}],"correct":[]},{"num":"29","text":"How does AWS charge for AWS Lambda usage once the free tier has been exceeded? (Choose two.)","options":[{"letter":"A","text":"By the time it takes for the Lambda function to execute."},{"letter":"B","text":"By the number of versions of a specific Lambda function."},{"letter":"C","text":"By the number of requests made for a given Lambda function."},{"letter":"D","text":"By the programming language that is used for the Lambda function."},{"letter":"E","text":"By the total number of Lambda functions in an AWS account."}],"correct":[]},{"num":"30","text":"Which of the following describes the relationships among AWS Regions, Availability Zones, and edge locations? (Choose two.)","options":[{"letter":"A","text":"There are more AWS Regions than Availability Zones."},{"letter":"B","text":"There are more edge locations than AWS Regions."},{"letter":"C","text":"An edge location is an Availability Zone."},{"letter":"D","text":"There are more AWS Regions than edge locations."},{"letter":"E","text":"There are more Availability Zones than AWS Regions."}],"correct":[]},{"num":"31","text":"What does AWS Shield Standard provide?","options":[{"letter":"A","text":"WAF rules"},{"letter":"B","text":"DDoS protection"},{"letter":"C","text":"Identity and Access Management (IAM) permissions and access to resources"},{"letter":"D","text":"Data encryption"}],"correct":[]},{"num":"32","text":"A company wants to build its new application workloads in the AWS Cloud instead of using on-premises resources. <br/> What expense can be reduced using the AWS Cloud?","options":[{"letter":"A","text":"The cost of writing custom-built Java or Node .js code"},{"letter":"B","text":"Penetration testing for security"},{"letter":"C","text":"hardware required to support new applications"},{"letter":"D","text":"Writing specific test cases for third-party applications."}],"correct":[]},{"num":"33","text":"What does AWS Marketplace allow users to do? (Choose two.)","options":[{"letter":"A","text":"Sell unused Amazon EC2 Spot Instances."},{"letter":"B","text":"Sell solutions to other AWS users."},{"letter":"C","text":"Buy third-party software that runs on AWS."},{"letter":"D","text":"Purchase AWS security and compliance documents."},{"letter":"E","text":"Order AWS Snowball."}],"correct":[]},{"num":"34","text":"What does it mean if a user deploys a hybrid cloud architecture on AWS?","options":[{"letter":"A","text":"All resources run using on-premises infrastructure."},{"letter":"B","text":"Some resources run on-premises and some run in a colocation center."},{"letter":"C","text":"All resources run in the AWS Cloud."},{"letter":"D","text":"Some resources run on-premises and some run in the AWS Cloud."}],"correct":[]},{"num":"35","text":"Which AWS service allows users to identify the changes made to a resource over time?","options":[{"letter":"A","text":"Amazon Inspector"},{"letter":"B","text":"AWS Config"},{"letter":"C","text":"AWS Service Catalog"},{"letter":"D","text":"AWS IAM"}],"correct":[]},{"num":"36","text":"How can a company reduce its Total Cost of Ownership (TCO) using AWS?","options":[{"letter":"A","text":"By minimizing large capital expenditures"},{"letter":"B","text":"By having no responsibility for third-party license costs"},{"letter":"C","text":"By having no operational expenditures"},{"letter":"D","text":"By having AWS manage applications"}],"correct":[]},{"num":"37","text":"Which activity is a customer responsibility in the AWS Cloud according to the AWS shared responsibility model?","options":[{"letter":"A","text":"Ensuring network connectivity from AWS to the internet"},{"letter":"B","text":"Patching and fixing flaws within the AWS Cloud infrastructure"},{"letter":"C","text":"Ensuring the physical security of cloud data centers"},{"letter":"D","text":"Ensuring Amazon EBS volumes are backed up"}],"correct":[]},{"num":"38","text":"What are the advantages of the AWS Cloud? (Choose two.)","options":[{"letter":"A","text":"Fixed rate monthly cost"},{"letter":"B","text":"No need to guess capacity requirements"},{"letter":"C","text":"Increased speed to market"},{"letter":"D","text":"Increased upfront capital expenditure"},{"letter":"E","text":"Physical access to cloud data centers"}],"correct":[]},{"num":"39","text":"When comparing the total cost of ownership (TCO) of an on-premises infrastructure to a cloud architecture, what costs should be considered? (Choose two.)","options":[{"letter":"A","text":"The credit card processing fees for application transactions in the cloud."},{"letter":"B","text":"The cost of purchasing and installing server hardware in the on-premises data."},{"letter":"C","text":"The cost of administering the infrastructure, including operating system and software installations, patches, backups, and recovering from failures."},{"letter":"D","text":"The costs of third-party penetration testing."},{"letter":"E","text":"The advertising costs associated with an ongoing enterprise-wide campaign."}],"correct":[]},{"num":"40","text":"Which AWS feature allows a company to take advantage of usage tiers for services across multiple member accounts?","options":[{"letter":"A","text":"Service control policies (SCPs)"},{"letter":"B","text":"Consolidated billing"},{"letter":"C","text":"All Upfront Reserved Instances"},{"letter":"D","text":"AWS Cost Explorer"}],"correct":[]},{"num":"41","text":"What is one of the customer's responsibilities according to the AWS shared responsibility model?","options":[{"letter":"A","text":"Virtualization infrastructure"},{"letter":"B","text":"Network infrastructure"},{"letter":"C","text":"Application security"},{"letter":"D","text":"Physical security of hardware"}],"correct":[]},{"num":"42","text":"What helps a company provide a lower latency experience to its users globally?","options":[{"letter":"A","text":"Using an AWS Region that is central to all users"},{"letter":"B","text":"Using a second Availability Zone in the AWS Region that is using used"},{"letter":"C","text":"Enabling caching in the AWS Region that is being used"},{"letter":"D","text":"Using edge locations to put content closer to all users"}],"correct":[]},{"num":"43","text":"How can the AWS Cloud increase user workforce productivity after migration from an on-premises data center?","options":[{"letter":"A","text":"Users do not have to wait for infrastructure provisioning."},{"letter":"B","text":"The AWS Cloud infrastructure is much faster than an on-premises data center infrastructure."},{"letter":"C","text":"AWS takes over application configuration management on behalf of users."},{"letter":"D","text":"Users do not need to address security and compliance issues."}],"correct":[]},{"num":"44","text":"Which AWS service provides a quick and automated way to create and manage AWS accounts?","options":[{"letter":"A","text":"AWS QuickSight"},{"letter":"B","text":"Amazon Lightsail"},{"letter":"C","text":"AWS Organizations"},{"letter":"D","text":"Amazon Connect"}],"correct":[]},{"num":"45","text":"Which Amazon RDS feature can be used to achieve high availability?","options":[{"letter":"A","text":"Multiple Availability Zones"},{"letter":"B","text":"Amazon Reserved Instances"},{"letter":"C","text":"Provisioned IOPS storage"},{"letter":"D","text":"Enhanced monitoring"}],"correct":[]},{"num":"46","text":"Where should users report that AWS resources are being used for malicious purposes?","options":[{"letter":"A","text":"AWS Abuse team"},{"letter":"B","text":"AWS Shield"},{"letter":"C","text":"AWS Support"},{"letter":"D","text":"AWS Developer Forums"}],"correct":[]},{"num":"47","text":"Which AWS service needs to be enabled to track all user account changes within the AWS Management Console?","options":[{"letter":"A","text":"AWS CloudTrail"},{"letter":"B","text":"Amazon Simple Notification Service (Amazon SNS)"},{"letter":"C","text":"VPC Flow Logs"},{"letter":"D","text":"AWS CloudHSM"}],"correct":[]},{"num":"48","text":"What is an AWS Cloud design best practice?","options":[{"letter":"A","text":"Tight coupling of components"},{"letter":"B","text":"Single point of failure"},{"letter":"C","text":"High availability"},{"letter":"D","text":"Overprovisioning of resources"}],"correct":[]},{"num":"49","text":"Why is AWS more economical than traditional data centers for applications with varying compute workloads?","options":[{"letter":"A","text":"Amazon Elastic Compute Cloud (Amazon EC2) costs are billed on a monthly basis."},{"letter":"B","text":"Customers retain full administrative access to their Amazon EC2 instances."},{"letter":"C","text":"Amazon EC2 instances can be launched on-demand when needed."},{"letter":"D","text":"Customers can permanently run enough instances to handle peak workloads."}],"correct":[]},{"num":"50","text":"Which AWS service would simplify migration of a database to AWS?","options":[{"letter":"A","text":"AWS Storage Gateway"},{"letter":"B","text":"AWS Database Migration Service (AWS DMS)"},{"letter":"C","text":"Amazon Elastic Compute Cloud (Amazon EC2)"},{"letter":"D","text":"Amazon AppStream 2.0"}],"correct":[]}];

            timerInterval = setInterval(() => {
                if (!examSubmitted) {
                    const elapsed = Math.floor((Date.now() - startTime) / 1000), mins = Math.floor(elapsed / 60), secs = elapsed % 60;
                    document.getElementById('timer').textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                }
            }, 1000);
        }
        function updateProgress() {
            const answered = Object.keys(userAnswers).filter(k => userAnswers[k].length > 0).length;
            const percentage = (answered / questions.length) * 100;
            document.getElementById('progress-fill').style.width = percentage + '%';
            document.getElementById('progress-text').textContent = `${answered} of ${questions.length} answered`;
        }
        function showQuestion(index) {
            currentQuestion = index;
            const q = questions[index], isMultiple = q.correct.length > 1, inputType = isMultiple ? 'checkbox' : 'radio';
            const userAns = userAnswers[index] || [];
            const showAnswer = questionRevealed[index] || false;
            
            document.getElementById('question-container').innerHTML = `
                <div class="question">
                    <div class="question-header">
                        <div class="question-text">Question ${index + 1} of ${questions.length}${isMultiple ? ' (Choose ' + q.correct.length + ')' : ''}</div>
                        <button class="flag-btn ${flaggedQuestions.has(index) ? 'flagged' : ''}" onclick="toggleFlag()">${flaggedQuestions.has(index) ? '🚩 Flagged' : '🏳️ Flag'}</button>
                    </div>
                    <div class="question-text" style="margin-bottom: 20px;">${q.text}</div>
                    ${q.options.map(opt => {
                        const isUserAnswer = userAns.includes(opt.letter);
                        const isCorrectAnswer = q.correct.includes(opt.letter);
                        let optClass = 'option';
                        if (showAnswer) {
                            if (isCorrectAnswer) optClass += ' correct';
                            else if (isUserAnswer) optClass += ' incorrect';
                        }
                        return `<label class="${optClass}" id="opt-${opt.letter}">
                            <input type="${inputType}" name="answer" value="${opt.letter}" 
                                ${isUserAnswer ? 'checked' : ''} 
                                ${showAnswer ? 'disabled' : ''}
                                onchange="selectOption('${opt.letter}', this.checked)">
                            <span><strong>${opt.letter}.</strong> ${opt.text}${showAnswer && isCorrectAnswer ? ' ✓' : ''}</span>
                        </label>`;
                    }).join('')}
                    ${showAnswer ? `<div style="margin-top: 15px; padding: 12px; background: #f8f9fa; border-radius: 4px; border-left: 4px solid #0073bb;">
                        <strong>Your answer:</strong> ${userAns.length > 0 ? userAns.join(', ') : 'Not answered'}<br>
                        <strong>Correct answer:</strong> ${q.correct.join(', ')}
                    </div>` : ''}
                </div>`;
            document.getElementById('prev-btn').disabled = index === 0;
            document.getElementById('next-btn').classList.toggle('hidden', index === questions.length - 1);
            document.getElementById('submit-btn').classList.toggle('hidden', index !== questions.length - 1);
            updateProgress();
        }
        function selectOption(letter, checked) {
            const q = questions[currentQuestion], isMultiple = q.correct.length > 1;
            if (!userAnswers[currentQuestion]) userAnswers[currentQuestion] = [];
            
            if (isMultiple) {
                if (checked) {
                    if (userAnswers[currentQuestion].length >= q.correct.length && !userAnswers[currentQuestion].includes(letter)) {
                        event.target.checked = false;
                        alert(`You can only select ${q.correct.length} options for this question.`);
                        return;
                    }
                    if (!userAnswers[currentQuestion].includes(letter)) userAnswers[currentQuestion].push(letter);
                } else {
                    userAnswers[currentQuestion] = userAnswers[currentQuestion].filter(a => a !== letter);
                }
            } else {
                // For single choice, allow deselecting by clicking the same option
                if (userAnswers[currentQuestion].includes(letter)) {
                    userAnswers[currentQuestion] = [];
                    event.target.checked = false;
                } else {
                    userAnswers[currentQuestion] = [letter];
                }
            }
            updateProgress();
        }
        function toggleFlag() { flaggedQuestions.has(currentQuestion) ? flaggedQuestions.delete(currentQuestion) : flaggedQuestions.add(currentQuestion); showQuestion(currentQuestion); }
        function showAnswerModal(isCorrect, userAns, correctAns, questionIndex) {
            const modal = document.getElementById('answerModal');
            const header = document.getElementById('modal-header');
            const body = document.getElementById('modal-body');
            const q = questions[questionIndex];
            
            // Get full text for answers
            const userAnswerText = userAns.map(letter => {
                const opt = q.options.find(o => o.letter === letter);
                return opt ? `<strong>${letter}.</strong> ${opt.text}` : letter;
            }).join('<br>');
            
            const correctAnswerText = correctAns.map(letter => {
                const opt = q.options.find(o => o.letter === letter);
                return opt ? `<strong>${letter}.</strong> ${opt.text}` : letter;
            }).join('<br>');
            
            if (isCorrect) {
                header.className = 'modal-header modal-correct';
                header.innerHTML = '✓ Correct!';
                body.innerHTML = `<p style="margin-bottom: 10px;">Your answer is correct:</p><div style="padding: 10px; background: #d4edda; border-radius: 4px; border-left: 4px solid #28a745;">${userAnswerText}</div>`;
            } else {
                header.className = 'modal-header modal-incorrect';
                header.innerHTML = '✗ Incorrect';
                body.innerHTML = `
                    <p style="margin-bottom: 10px;"><strong>Your answer:</strong></p>
                    <div style="padding: 10px; background: #f8d7da; border-radius: 4px; border-left: 4px solid #dc3545; margin-bottom: 15px;">${userAns.length > 0 ? userAnswerText : 'Not answered'}</div>
                    <p style="margin-bottom: 10px;"><strong>Correct answer:</strong></p>
                    <div style="padding: 10px; background: #d4edda; border-radius: 4px; border-left: 4px solid #28a745;">${correctAnswerText}</div>
                `;
            }
            
            modal.style.display = 'block';
        }
        function closeModal() {
            document.getElementById('answerModal').style.display = 'none';
            if (pendingNavigation !== null) {
                currentQuestion = pendingNavigation;
                pendingNavigation = null;
                showQuestion(currentQuestion);
            }
        }
        function goToQuestion(index) { 
            const userAns = userAnswers[currentQuestion] || [];
            if (userAns.length > 0 && index !== currentQuestion) {
                const q = questions[currentQuestion];
                const correctAns = q.correct;
                const isCorrect = userAns.length === correctAns.length && userAns.every(a => correctAns.includes(a));
                questionRevealed[currentQuestion] = true;
                pendingNavigation = index;
                showAnswerModal(isCorrect, userAns, correctAns, currentQuestion);
            } else {
                showQuestion(index);
            }
        }
        function nextQuestion() { 
            if (currentQuestion < questions.length - 1) { 
                const userAns = userAnswers[currentQuestion] || [];
                if (userAns.length > 0) {
                    const q = questions[currentQuestion];
                    const correctAns = q.correct;
                    const isCorrect = userAns.length === correctAns.length && userAns.every(a => correctAns.includes(a));
                    questionRevealed[currentQuestion] = true;
                    pendingNavigation = currentQuestion + 1;
                    showAnswerModal(isCorrect, userAns, correctAns, currentQuestion);
                } else {
                    currentQuestion++; 
                    showQuestion(currentQuestion);
                }
            } 
        }
        function prevQuestion() { 
            if (currentQuestion > 0) { 
                const userAns = userAnswers[currentQuestion] || [];
                if (userAns.length > 0) {
                    const q = questions[currentQuestion];
                    const correctAns = q.correct;
                    const isCorrect = userAns.length === correctAns.length && userAns.every(a => correctAns.includes(a));
                    questionRevealed[currentQuestion] = true;
                    pendingNavigation = currentQuestion - 1;
                    showAnswerModal(isCorrect, userAns, correctAns, currentQuestion);
                } else {
                    currentQuestion--; 
                    showQuestion(currentQuestion);
                }
            } 
        }
        function confirmSubmit() {
            const answered = Object.keys(userAnswers).filter(k => userAnswers[k].length > 0).length, unanswered = questions.length - answered;
            if (unanswered > 0 && !confirm(`You have ${unanswered} unanswered question(s). Do you want to submit anyway?`)) return;
            submitExam();
        }
        function submitExam() {
            examSubmitted = true; clearInterval(timerInterval);
            let correct = 0, incorrect = 0, unanswered = 0;
            questions.forEach((q, i) => {
                const userAns = userAnswers[i] || [], correctAns = q.correct;
                if (userAns.length === 0) unanswered++;
                else if (userAns.length === correctAns.length && userAns.every(a => correctAns.includes(a))) correct++;
                else incorrect++;
            });
            const percentage = (correct / questions.length * 100).toFixed(1), passed = percentage >= 70;
            const elapsed = Math.floor((Date.now() - startTime) / 1000), mins = Math.floor(elapsed / 60), secs = elapsed % 60;
            document.getElementById('exam-view').classList.add('hidden');
            document.getElementById('results-view').classList.remove('hidden');
            document.getElementById('score-display').innerHTML = `Score: ${correct}/${questions.length} (${percentage}%)`;
            document.getElementById('pass-status').innerHTML = `<div class="score ${passed ? 'pass' : 'fail'}">${passed ? '✓ PASSED' : '✗ FAILED'}</div>`;
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('incorrect-count').textContent = incorrect;
            document.getElementById('unanswered-count').textContent = unanswered;
            document.getElementById('time-taken').innerHTML = `<strong>Time taken:</strong> ${mins}m ${secs}s`;
        }
        function reviewAnswers() {
            document.getElementById('all-questions').innerHTML = questions.map((q, i) => {
                const userAns = userAnswers[i] || [], correctAns = q.correct;
                const isCorrect = userAns.length === correctAns.length && userAns.every(a => correctAns.includes(a)), isUnanswered = userAns.length === 0;
                return `<div class="question" style="border-left: 4px solid ${isUnanswered ? '#ffc107' : isCorrect ? '#28a745' : '#dc3545'}; padding-left: 15px; margin-bottom: 30px;">
                    <div class="question-text">Question ${i + 1}: ${q.text}</div>
                    ${q.options.map(opt => {
                        const isUserAnswer = userAns.includes(opt.letter), isCorrectAnswer = correctAns.includes(opt.letter);
                        let className = 'option';
                        if (isCorrectAnswer) className += ' correct';
                        else if (isUserAnswer) className += ' incorrect';
                        return `<div class="${className}"><strong>${opt.letter}.</strong> ${opt.text} ${isCorrectAnswer ? '✓' : ''}</div>`;
                    }).join('')}
                    <div style="margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 4px;">
                        <strong>Your answer:</strong> ${userAns.length > 0 ? userAns.join(', ') : 'Not answered'}<br>
                        <strong>Correct answer:</strong> ${correctAns.join(', ')}
                    </div></div>`;
            }).join('');
            document.getElementById('results-view').classList.add('hidden');
            document.getElementById('review-view').classList.remove('hidden');
        }
        function backToResults() { document.getElementById('review-view').classList.add('hidden'); document.getElementById('results-view').classList.remove('hidden'); }
        function restartExam() {
            currentQuestion = 0; userAnswers = {}; flaggedQuestions.clear(); questionRevealed = {}; examSubmitted = false; startTime = Date.now(); clearInterval(timerInterval);
            document.getElementById('results-view').classList.add('hidden'); document.getElementById('review-view').classList.add('hidden'); document.getElementById('exam-view').classList.remove('hidden');
            initExam();
        }
        initExam();
    </script>
</body>
</html>
