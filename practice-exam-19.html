    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 10px; }

        .option.selected { background: #e3f2fd; border-color: #0073bb; }
        .option.correct { background: #d4edda; border-color: #28a745; }
        .option.incorrect { background: #f8d7da; border-color: #dc3545; }

        .buttons { margin: 15px 0; display: flex; gap: 8px; flex-wrap: wrap; }

        .btn-secondary { background: #232f3e; color: white; }
        .btn-secondary:hover { background: #131921; }

        .score { font-size: 20px; font-weight: bold; margin: 10px 0; }
        .pass { color: #28a745; }
        .fail { color: #dc3545; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .stat-card { background: white; padding: 12px; border-radius: 4px; text-align: center; border: 2px solid #e0e0e0; }
        .stat-value { font-size: 24px; font-weight: bold; color: #232f3e; }
        .stat-label { font-size: 12px; color: #666; margin-top: 5px; }
        .hidden { display: none; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); padding: 20px; }

        .modal-footer { text-align: center; margin-top: 15px; }
        .modal-btn { padding: 10px 24px; background: #ff9900; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }

            .timer { padding: 15px; font-size: 20px; }

            .option { padding: 12px; font-size: 16px; }
            button { padding: 12px 24px; font-size: 16px; }
            .flag-btn { padding: 8px 16px; font-size: 14px; }
            .modal-content { padding: 30px; }
            .modal-header { font-size: 24px; margin-bottom: 20px; }
            .modal-body { font-size: 16px; margin: 20px 0; }
            .modal-footer { margin-top: 20px; }
            .modal-btn { padding: 12px 30px; font-size: 16px; }
        }
    </style>
</head>

cal access to data centers"},{"letter":"E","text":"Patch management of an Amazon EC2 instance operating system"}],"correct":[]},{"num":"44","text":"Which AWS service is suitable for an event-driven workload?","options":[{"letter":"A","text":"Amazon EC2"},{"letter":"B","text":"AWS Elastic Beanstalk"},{"letter":"C","text":"AWS Lambda"},{"letter":"D","text":"Amazon Lumberyard"}],"correct":[]},{"num":"45","text":"What is a value proposition of the AWS Cloud?","options":[{"letter":"A","text":"AWS is responsible for security in the AWS Cloud"},{"letter":"B","text":"No long-term contract is required"},{"letter":"C","text":"Provision new servers in days"},{"letter":"D","text":"AWS manages user applications in the AWS Cloud"}],"correct":[]},{"num":"46","text":"What is a characteristic of Amazon S3 cross-region replication?","options":[{"letter":"A","text":"Both source and destination S3 buckets must have versioning disabled"},{"letter":"B","text":"The source and destination S3 buckets cannot be in different AWS Regions"},{"letter":"C","text":"S3 buckets configured for cross-region replication can be owned by a single AWS account or by different accounts"},{"letter":"D","text":"The source S3 bucket owner must have the source and destination AWS Regions disabled for their account"}],"correct":[]},{"num":"47","text":"What is a user responsible for when running an application in the AWS Cloud?   - A. Managing physical hardware","options":[{"letter":"B","text":"Updating the underlying hypervisor"},{"letter":"C","text":"Providing a list of users approved for data center access"},{"letter":"D","text":"Managing application software updates"}],"correct":[]},{"num":"48","text":"A company that does business online needs to quickly deliver new functionality in an iterative manner, minimizing the time to market. <br/> Which AWS Cloud feature can provide this?","options":[{"letter":"A","text":"Elasticity"},{"letter":"B","text":"High availability"},{"letter":"C","text":"Agility"},{"letter"             timerInterval = setInterval(() => {
                if (!examSubmitted) {
                    const elapsed = Math.floor((Date.now() - startTime) / 1000), mins = Math.floor(elapsed / 60), secs = elapsed % 60;
                    document.getElementById('timer').textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                }
            }, 1000);
        }
        function updateProgress() {
            const answered = Object.keys(userAnswers).filter(k => userAnswers[k].length > 0).length;
            const percentage = (answered / questions.length) * 100;
            document.getElementById('progress-fill').style.width = percentage + '%';
            document.getElementById('progress-text').textContent = `${answered} of ${questions.length} answered`;
        }
        function showQuestion(index) {
            currentQuestion = index;
            const q = questions[index], isMultiple = q.correct.length > 1, inputType = isMultiple ? 'checkbox' : 'radio';
            const userAns = userAnswers[index] || [];
            const showAnswer = questionRevealed[index] || false;
            
            document.getElementById('question-container').innerHTML = `
                <div class="question">
                    <div class="question-header">
                        <div class="question-text">Question ${index + 1} of ${questions.length}${isMultiple ? ' (Choose ' + q.correct.length + ')' : ''}</div>
                        <button class="flag-btn ${flaggedQuestions.has(index) ? 'flagged' : ''}" onclick="toggleFlag()">${flaggedQuestions.has(index) ? '🚩 Flagged' : '🏳️ Flag'}</button>
                    </div>
                    <div class="question-text" style="margin-bottom: 20px;">${q.text}</div>
                    ${q.options.map(opt => {
                        const isUserAnswer = userAns.includes(opt.letter);
                        const isCorrectAnswer = q.correct.includes(opt.letter);
                        let optClass = 'option';
                        if (showAnswer) {
                            if (isCorrectAnswer) optClass += ' correct';
                            else if (isUserAnswer) optClass += ' incorrect';
                        }
                        return `<label class="${optClass}" id="opt-${opt.letter}">
                            <input type="${inputType}" name="answer" value="${opt.letter}" 
                                ${isUserAnswer ? 'checked' : ''} 
                                ${showAnswer ? 'disabled' : ''}
                                onchange="selectOption('${opt.letter}', this.checked)">
                            <span><strong>${opt.letter}.</strong> ${opt.text}${showAnswer && isCorrectAnswer ? ' ✓' : ''}</span>
                        </label>`;
                    }).join('')}
                    ${showAnswer ? `<div style="margin-top: 15px; padding: 12px; background: #f8f9fa; border-radius: 4px; border-left: 4px solid #0073bb;">
                        <strong>Your answer:</strong> ${userAns.length > 0 ? userAns.join(', ') : 'Not answered'}<br>
                        <strong>Correct answer:</strong> ${q.correct.join(', ')}
                    </div>` : ''}
                </div>`;
            document.getElementById('prev-btn').disabled = index === 0;
            document.getElementById('next-btn').classList.toggle('hidden', index === questions.length - 1);
            document.getElementById('submit-btn').classList.toggle('hidden', index !== questions.length - 1);
            updateProgress();
        }
        function selectOption(letter, checked) {
            const q = questions[currentQuestion], isMultiple = q.correct.length > 1;
            if (!userAnswers[currentQuestion]) userAnswers[currentQuestion] = [];
            
            if (isMultiple) {
                if (checked) {
                    if (userAnswers[currentQuestion].length >= q.correct.length && !userAnswers[currentQuestion].includes(letter)) {
                        event.target.checked = false;
                        alert(`You can only select ${q.correct.length} options for this question.`);
                        return;
                    }
                    if (!userAnswers[currentQuestion].includes(letter)) userAnswers[currentQuestion].push(letter);
                } else {
                    userAnswers[currentQuestion] = userAnswers[currentQuestion].filter(a => a !== letter);
                }
            } else {
                // For single choice, allow deselecting by clicking the same option
                if (userAnswers[currentQuestion].includes(letter)) {
                    userAnswers[currentQuestion] = [];
                    event.target.checked = false;
                } else {
                    userAnswers[currentQuestion] = [letter];
                }
            }
            updateProgress();
        }
        function toggleFlag() { flaggedQuestions.has(currentQuestion) ? flaggedQuestions.delete(currentQuestion) : flaggedQuestions.add(currentQuestion); showQuestion(currentQuestion); }
        function showAnswerModal(isCorrect, userAns, correctAns, questionIndex) {
            const modal = document.getElementById('answerModal');
            const header = document.getElementById('modal-header');
            const body = document.getElementById('modal-body');
            const q = questions[questionIndex];
            
            // Get full text for answers
            const userAnswerText = userAns.map(letter => {
                const opt = q.options.find(o => o.letter === letter);
                return opt ? `<strong>${letter}.</strong> ${opt.text}` : letter;
            }).join('<br>');
            
            const correctAnswerText = correctAns.map(letter => {
                const opt = q.options.find(o => o.letter === letter);
                return opt ? `<strong>${letter}.</strong> ${opt.text}` : letter;
            }).join('<br>');
            
            if (isCorrect) {
                header.className = 'modal-header modal-correct';
                header.innerHTML = '✓ Correct!';
                body.innerHTML = `<p style="margin-bottom: 10px;">Your answer is correct:</p><div style="padding: 10px; background: #d4edda; border-radius: 4px; border-left: 4px solid #28a745;">${userAnswerText}</div>`;
            } else {
                header.className = 'modal-header modal-incorrect';
                header.innerHTML = '✗ Incorrect';
                body.innerHTML = `
                    <p style="margin-bottom: 10px;"><strong>Your answer:</strong></p>
                    <div style="padding: 10px; background: #f8d7da; border-radius: 4px; border-left: 4px solid #dc3545; margin-bottom: 15px;">${userAns.length > 0 ? userAnswerText : 'Not answered'}</div>
                    <p style="margin-bottom: 10px;"><strong>Correct answer:</strong></p>
                    <div style="padding: 10px; background: #d4edda; border-radius: 4px; border-left: 4px solid #28a745;">${correctAnswerText}</div>
                `;
            }
            
            modal.style.display = 'block';
        }
        function closeModal() {
            document.getElementById('answerModal').style.display = 'none';
            if (pendingNavigation !== null) {
                currentQuestion = pendingNavigation;
                pendingNavigation = null;
                showQuestion(currentQuestion);
            }
        }
        function goToQuestion(index) { 
            const userAns = userAnswers[currentQuestion] || [];
            if (userAns.length > 0 && index !== currentQuestion) {
                const q = questions[currentQuestion];
                const correctAns = q.correct;
                const isCorrect = userAns.length === correctAns.length && userAns.every(a => correctAns.includes(a));
                questionRevealed[currentQuestion] = true;
                pendingNavigation = index;
                showAnswerModal(isCorrect, userAns, correctAns, currentQuestion);
            } else {
                showQuestion(index);
            }
        }
        function nextQuestion() { 
            if (currentQuestion < questions.length - 1) { 
                const userAns = userAnswers[currentQuestion] || [];
                if (userAns.length > 0) {
                    const q = questions[currentQuestion];
                    const correctAns = q.correct;
                    const isCorrect = userAns.length === correctAns.length && userAns.every(a => correctAns.includes(a));
                    questionRevealed[currentQuestion] = true;
                    pendingNavigation = currentQuestion + 1;
                    showAnswerModal(isCorrect, userAns, correctAns, currentQuestion);
                } else {
                    currentQuestion++; 
                    showQuestion(currentQuestion);
                }
            } 
        }
        function prevQuestion() { 
            if (currentQuestion > 0) { 
                const userAns = userAnswers[currentQuestion] || [];
                if (userAns.length > 0) {
                    const q = questions[currentQuestion];
                    const correctAns = q.correct;
                    const isCorrect = userAns.length === correctAns.length && userAns.every(a => correctAns.includes(a));
                    questionRevealed[currentQuestion] = true;
                    pendingNavigation = currentQuestion - 1;
                    showAnswerModal(isCorrect, userAns, correctAns, currentQuestion);
                } else {
                    currentQuestion--; 
                    showQuestion(currentQuestion);
                }
            } 
        }
        function confirmSubmit() {
            const answered = Object.keys(userAnswers).filter(k => userAnswers[k].length > 0).length, unanswered = questions.length - answered;
            if (unanswered > 0 && !confirm(`You have ${unanswered} unanswered question(s). Do you want to submit anyway?`)) return;
            submitExam();
        }
        function submitExam() {
            examSubmitted = true; clearInterval(timerInterval);
            let correct = 0, incorrect = 0, unanswered = 0;
            questions.forEach((q, i) => {
                const userAns = userAnswers[i] || [], correctAns = q.correct;
                if (userAns.length === 0) unanswered++;
                else if (userAns.length === correctAns.length && userAns.every(a => correctAns.includes(a))) correct++;
                else incorrect++;
            });
            const percentage = (correct / questions.length * 100).toFixed(1), passed = percentage >= 70;
            const elapsed = Math.floor((Date.now() - startTime) / 1000), mins = Math.floor(elapsed / 60), secs = elapsed % 60;
            document.getElementById('exam-view').classList.add('hidden');
            document.getElementById('results-view').classList.remove('hidden');
            document.getElementById('score-display').innerHTML = `Score: ${correct}/${questions.length} (${percentage}%)`;
            document.getElementById('pass-status').innerHTML = `<div class="score ${passed ? 'pass' : 'fail'}">${passed ? '✓ PASSED' : '✗ FAILED'}</div>`;
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('incorrect-count').textContent = incorrect;
            document.getElementById('unanswered-count').textContent = unanswered;
            document.getElementById('time-taken').innerHTML = `<strong>Time taken:</strong> ${mins}m ${secs}s`;
        }
        function reviewAnswers() {
            document.getElementById('all-questions').innerHTML = questions.map((q, i) => {
                const userAns = userAnswers[i] || [], correctAns = q.correct;
                const isCorrect = userAns.length === correctAns.length && userAns.every(a => correctAns.includes(a)), isUnanswered = userAns.length === 0;
                return `<div class="question" style="border-left: 4px solid ${isUnanswered ? '#ffc107' : isCorrect ? '#28a745' : '#dc3545'}; padding-left: 15px; margin-bottom: 30px;">
                    <div class="question-text">Question ${i + 1}: ${q.text}</div>
                    ${q.options.map(opt => {
                        const isUserAnswer = userAns.includes(opt.letter), isCorrectAnswer = correctAns.includes(opt.letter);
                        let className = 'option';
                        if (isCorrectAnswer) className += ' correct';
                        else if (isUserAnswer) className += ' incorrect';
                        return `<div class="${className}"><strong>${opt.letter}.</strong> ${opt.text} ${isCorrectAnswer ? '✓' : ''}</div>`;
                    }).join('')}
                    <div style="margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 4px;">
                        <strong>Your answer:</strong> ${userAns.length > 0 ? userAns.join(', ') : 'Not answered'}<br>
                        <strong>Correct answer:</strong> ${correctAns.join(', ')}
                    </div></div>`;
            }).join('');
            document.getElementById('results-view').classList.add('hidden');
            document.getElementById('review-view').classList.remove('hidden');
        }
        function backToResults() { document.getElementById('review-view').classList.add('hidden'); document.getElementById('results-view').classList.remove('hidden'); }
        function restartExam() {
            currentQuestion = 0; userAnswers = {}; flaggedQuestions.clear(); questionRevealed = {}; examSubmitted = false; startTime = Date.now(); clearInterval(timerInterval);
            document.getElementById('results-view').classList.add('hidden'); document.getElementById('review-view').classList.add('hidden'); document.getElementById('exam-view').classList.remove('hidden');
            initExam();
        }
        initExam();
    </script>
</body>
</html>
