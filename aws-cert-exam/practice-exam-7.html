    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 10px; }
        .top-bar { margin-bottom: 10px; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: #232f3e; color: white; text-decoration: none; border-radius: 4px; font-weight: 600; font-size: 14px; }
        .back-btn:hover { background: #131921; }

        .progress-bar { width: 100%; height: 6px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }

        .question-text { font-size: 16px; font-weight: 600; color: #333; }
        .flag-btn { padding: 6px 12px; border: 2px solid #ffc107; background: white; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; }
        .flag-btn.flagged { background: #ffc107; color: white; }
        .option { padding: 10px; margin: 8px 0; border: 2px solid #ddd; border-radius: 4px; cursor: pointer; transition: all 0.2s; display: flex; align-items: flex-start; font-size: 14px; }
        .option:hover { background: #f0f8ff; border-color: #0073bb; }
        .option.selected { background: #e3f2fd; border-color: #0073bb; }
        .option.correct { background: #d4edda; border-color: #28a745; }
        .option.incorrect { background: #f8d7da; border-color: #dc3545; }
        .option input[type="checkbox"], .option input[type="radio"] { margin-right: 8px; margin-top: 2px; width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }
        .buttons { margin: 15px 0; display: flex; gap: 8px; flex-wrap: wrap; }
        button { padding: 10px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .btn-primary { background: #ff9900; color: white; }
        .btn-primary:hover { background: #ec7211; }
        .btn-secondary { background: #232f3e; color: white; }
        .btn-secondary:hover { background: #131921; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .results { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .score { font-size: 20px; font-weight: bold; margin: 10px 0; }
        .pass { color: #28a745; }
        .fail { color: #dc3545; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .stat-card { background: white; padding: 12px; border-radius: 4px; text-align: center; border: 2px solid #e0e0e0; }
        .stat-value { font-size: 24px; font-weight: bold; color: #232f3e; }
        .stat-label { font-size: 12px; color: #666; margin-top: 5px; }
        .hidden { display: none; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); padding: 20px; }
        .modal-content { background: white; margin: 10% auto; padding: 20px; border-radius: 8px; max-width: 500px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .modal-header { font-size: 20px; font-weight: bold; margin-bottom: 15px; text-align: center; }
        .modal-correct { color: #28a745; }
        .modal-incorrect { color: #dc3545; }
        .modal-body { margin: 15px 0; font-size: 14px; line-height: 1.6; }
        .modal-footer { text-align: center; margin-top: 15px; }
        .modal-btn { padding: 10px 24px; background: #ff9900; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .modal-btn:hover { background: #ec7211; }
        @media (min-width: 768px) {
            body { padding: 20px; }
            .container { max-width: 900px; margin: 0 auto; }
            .main-content { padding: 30px; }
            h1 { font-size: 24px; margin-bottom: 20px; }
            .timer { padding: 15px; font-size: 20px; }
            .progress-text { font-size: 14px; }
            .question-text { font-size: 18px; }
            .option { padding: 12px; font-size: 16px; }
            button { padding: 12px 24px; font-size: 16px; }
            .flag-btn { padding: 8px 16px; font-size: 14px; }
            .modal-content { padding: 30px; }
            .modal-header { font-size: 24px; margin-bottom: 20px; }
            .modal-body { font-size: 16px; margin: 20px 0; }
            .modal-footer { margin-top: 20px; }
            .modal-btn { padding: 12px 30px; font-size: 16px; }
        }
    </style>

    <script>
        const questions = [{"num":"1","text":"Which of the following can help secure your sensitive data in Amazon S3? (Choose TWO)","options":[{"letter":"A","text":"Delete the encryption keys once your data is encrypted."},{"letter":"B","text":"With AWS you do not need to worry about encryption."},{"letter":"C","text":"Enable S3 Encryption."},{"letter":"D","text":"Encrypt the data prior to uploading it."},{"letter":"E","text":"Delete all IAM users that have access to S3."}],"correct":["C","D"]},{"num":"2","text":"Which AWS service helps developers compile and test their code?","options":[{"letter":"A","text":"AWS CodeDeploy."},{"letter":"B","text":"AWS CodeCommit."},{"letter":"C","text":"CloudEndure."},{"letter":"D","text":"AWS CodeBuild."}],"correct":["D"]},{"num":"3","text":"Which of the following will affect how much you are charged for storing objects in S3? (Choose TWO)","options":[{"letter":"A","text":"Using default encryption for any number of S3 buckets."},{"letter":"B","text":"The number of EBS volumes attached to your instances."},{"letter":"C","text":"The storage class used for the objects stored."},{"letter":"D","text":"Creating and deleting S3 buckets."},{"letter":"E","text":"The total size in gigabytes of all objects stored."}],"correct":["C","E"]},{"num":"4","text":"What does the Amazon CloudFront service provide? (Choose TWO)","options":[{"letter":"A","text":"Tracks user activity and APl usage."},{"letter":"B","text":"Increases application availability by caching at the edge."},{"letter":"C","text":"Enables faster disaster recovery."},{"letter":"D","text":"Stores archived data at very low costs."},{"letter":"E","text":"Delivers content to end users with low latency."}],"correct":["B","E"]},{"num":"5","text":"You are facing a lot of problems with your current contact center. Which service provides a cloud-based contact center that can deliver a better service for your customers?","options":[{"letter":"A","text":"Amazon Lightsail."},{"letter":"B","text":"Amazon Connect."},{"letter":"C","text":"AWS Direct Connect."},{"letter":"D","text":"AWS Elastic Beanstalk."}],"correct":["B"]},{"num":"6","text":"You have migrated your application to AWS recently. How can you view the AWS costs applied to your account?","options":[{"letter":"A","text":"Using the AWS Cost & Usage Report."},{"letter":"B","text":"Using the AWS Total Cost of Ownership (TCO) dashboard."},{"letter":"C","text":"Using the AWS CloudWatch logs dashboard."},{"letter":"D","text":"Using the Amazon VPC dashboard."}],"correct":["A"]},{"num":"7","text":"Which of the following are valid Amazon EC2 Reserved Instance types? (Choose TWO)","options":[{"letter":"A","text":"Convertible."},{"letter":"B","text":"Expedited."},{"letter":"C","text":"Bulk."},{"letter":"D","text":"Spot."},{"letter":"E","text":"Standard."}],"correct":["A","E"]},{"num":"8","text":"Which of the following services gives you access to all AWS auditor-issued reports and certifications?","options":[{"letter":"A","text":"AWS Artifact."},{"letter":"B","text":"AWS Config."},{"letter":"C","text":"Amazon CloudWatch."},{"letter":"D","text":"AWS CloudTrail."}],"correct":["A"]},{"num":"9","text":"You manage a blog on AWS that has different environments: development, testing, and production. What can you use to create a custom console for each environment to view and manage your resources easily?","options":[{"letter":"A","text":"AWS Resource Groups."},{"letter":"B","text":"AWS Placement Groups."},{"letter":"C","text":"AWS Management Console."},{"letter":"D","text":"AWS Tag Editor."}],"correct":["A"]},{"num":"10","text":"Which AWS service collects metrics from running EC2 instances?","options":[{"letter":"A","text":"Amazon Inspector."},{"letter":"B","text":"Amazon CloudWatch."},{"letter":"C","text":"AWS CloudFormation."},{"letter":"D","text":"AWS CloudTrail."}],"correct":["B"]},{"num":"11","text":"Your web application currently faces performance issues and suffers from long load times. Which of the following AWS services could help fix these issues and improve performance?","options":[{"letter":"A","text":"Amazon Detective."},{"letter":"B","text":"AWS X-Ray."},{"letter":"C","text":"AWS Security Hub."},{"letter":"D","text":"AWS Shield."}],"correct":["B"]},{"num":"12","text":"Which of the following compute resources are serverless? (Choose TWO)","options":[{"letter":"A","text":"Amazon EC2."},{"letter":"B","text":"AWS Fargate."},{"letter":"C","text":"AWS Lambda."},{"letter":"D","text":"Amazon ECS."},{"letter":"E","text":"Amazon EMR."}],"correct":["B","C"]},{"num":"13","text":"For compliance and regulatory purposes, a government agency requires that their applications must run on hardware that is dedicated to them only. How can you meet this requirement?","options":[{"letter":"A","text":"Use EC2 Dedicated Hosts."},{"letter":"B","text":"Use EC2 Reserved Instances."},{"letter":"C","text":"Use EC2 Spot Instances."},{"letter":"D","text":"Use EC2 On-demand Instances."}],"correct":["A"]},{"num":"14","text":"Which AWS Cost Governance best practice recommends refining workloads regularly to make the most of existing AWS resources and reduce costs?","options":[{"letter":"A","text":"Tagging Enforcement."},{"letter":"B","text":"Architecture Optimization."},{"letter":"C","text":"Budgeting Processes."},{"letter":"D","text":"Resource Controls."}],"correct":["B"]},{"num":"15","text":"An organization needs to build a financial application that requires support for ACID transactions. Which AWS database service is most appropriate in this case?","options":[{"letter":"A","text":"RedShift."},{"letter":"B","text":"RDS."},{"letter":"C","text":"CloudHSM."},{"letter":"D","text":"DMS."}],"correct":["B"]},{"num":"16","text":"What can you use to assign permissions directly to an IAM user?","options":[{"letter":"A","text":"IAM Identity."},{"letter":"B","text":"IAM Group."},{"letter":"C","text":"IAM Role."},{"letter":"D","text":"IAM Policy."}],"correct":["D"]},{"num":"17","text":"The owner of an E-Commerce application notices that the compute capacity requirements vary heavily from time to time. What makes AWS more economical than traditional data centers for this type of application?","options":[{"letter":"A","text":"AWS allows customers to launch powerful EC2 instances to handle spikes in load."},{"letter":"B","text":"AWS allows customers to pay upfront to get bigger discounts."},{"letter":"C","text":"AWS allows customers to launch and terminate EC2 instances based on demand."},{"letter":"D","text":"AWS allows customers to choose cheaper types of EC2 instances that best fit their needs."}],"correct":["C"]},{"num":"18","text":"Amazon RDS supports multiple database engines to choose from. Which of the following is not one of them?","options":[{"letter":"A","text":"PostgreSQL."},{"letter":"B","text":"Oracle."},{"letter":"C","text":"Microsoft SQL Server."},{"letter":"D","text":"Teradata."}],"correct":["D"]},{"num":"19","text":"Which of the following AWS services would help you migrate on-premise databases to AWS?","options":[{"letter":"A","text":"AWS DMS."},{"letter":"B","text":"Amazon S3 Transfer Acceleration."},{"letter":"C","text":"AWS Directory Service."},{"letter":"D","text":"AWS Transit Gateway."}],"correct":["A"]},{"num":"20","text":"For new AWS customers, what is the EASIEST way to launch a simple WordPress website on AWS?","options":[{"letter":"A","text":"Run WordPress on an Amazon Lightsail instance."},{"letter":"B","text":"Install WordPress on an Amazon EC2 instance."},{"letter":"C","text":"Use the Amazon S3 Web hosting feature."},{"letter":"D","text":"Host the website directly on AWS Cloud Development Kit (AWS CDK)."}],"correct":["A"]},{"num":"21","text":"Which of the following would you use to manage your encryption keys in the AWS Cloud? (Choose TWO)","options":[{"letter":"A","text":"AWS KMS."},{"letter":"B","text":"AWS Certificate Manager."},{"letter":"C","text":"AWS CodeDeploy."},{"letter":"D","text":"AWS CodeCommit."},{"letter":"E","text":"CloudHSM."}],"correct":["A","E"]},{"num":"22","text":"Which of the following services allows you to install and run custom relational database software?","options":[{"letter":"A","text":"Amazon EC2."},{"letter":"B","text":"Amazon Cognito."},{"letter":"C","text":"Amazon RDS."},{"letter":"D","text":"Amazon Inspector."}],"correct":["A"]},{"num":"23","text":"Your application requirements for CPU and RAM are changing in an unpredictable way. Which service can be used to dynamically adjust these resources based on load?","options":[{"letter":"A","text":"Auto Scaling."},{"letter":"B","text":"ELB."},{"letter":"C","text":"Amazon Route53."},{"letter":"D","text":"Amazon Elastic Container Service."}],"correct":["A"]},{"num":"24","text":"A company has infrastructure hosted in an on-premises data center. They currently have an operations team that takes care of identity management. If they decide to migrate to the AWS cloud, which of the following services would help them perform the same role in AWS?","options":[{"letter":"A","text":"AWS IAM."},{"letter":"B","text":"AWS Outposts."},{"letter":"C","text":"AWS Federation."},{"letter":"D","text":"Amazon Redshift."}],"correct":["A"]},{"num":"25","text":"What are some key design principles for designing public cloud systems? (Choose TWO)","options":[{"letter":"A","text":"Reserved capacity instead of on demand."},{"letter":"B","text":"Loose coupling over tight coupling."},{"letter":"C","text":"Servers instead of managed services."},{"letter":"D","text":"Disposable resources instead of fixed servers."},{"letter":"E","text":"Multi-AZ deployments instead of multi-region deployments."}],"correct":["B","D"]},{"num":"26","text":"Where can AWS account owners get a list of all users in their account, including the status of their AWS credentials?","options":[{"letter":"A","text":"AWS CloudTrail Trails."},{"letter":"B","text":"IAM Credential Report."},{"letter":"C","text":"AWS Artifact reports."},{"letter":"D","text":"AWS Cost and Usage Report."}],"correct":["B"]},{"num":"27","text":"Which of the following services enables you to easily generate and use your own encryption keys in the AWS Cloud?","options":[{"letter":"A","text":"AWS Shield."},{"letter":"B","text":"AWS Certificate Manager."},{"letter":"C","text":"AWS CloudHSM."},{"letter":"D","text":"AWS WAF."}],"correct":["C"]},{"num":"28","text":"You have developed a web application targeting a global audience. Which of the following will help you achieve the highest redundancy and fault tolerance from an infrastructure perspective?","options":[{"letter":"A","text":"There is no need to architect for these capabilities in AWS, as AWS is redundant by default."},{"letter":"B","text":"Deploy the application in a single Availability Zone."},{"letter":"C","text":"Deploy the application in multiple Availability Zones in a single AWS region."},{"letter":"D","text":"Deploy the application in multiple Availability Zones in multiple AWS regions."}],"correct":["D"]},{"num":"29","text":"For some services, AWS automatically replicates data across multiple Availability Zones to provide fault tolerance in the event of a server failure or Availability Zone outage. Select TWO services that automatically replicate data across Availability Zones.","options":[{"letter":"A","text":"Instance Store."},{"letter":"B","text":"S3."},{"letter":"C","text":"DynamoDB."},{"letter":"D","text":"Amazon Route 53."},{"letter":"E","text":"AWS VPN."}],"correct":["B","C"]},{"num":"30","text":"Which of the following factors affect Amazon CloudFront cost? (Choose TWO)","options":[{"letter":"A","text":"Number of Requests."},{"letter":"B","text":"Traffic Distribution."},{"letter":"C","text":"Number of Volumes."},{"letter":"D","text":"Instance type."},{"letter":"E","text":"Storage Class."}],"correct":["A","B"]},{"num":"31","text":"Which of the following resources can an AWS customer use to learn more about prohibited uses of the services offered by AWS?","options":[{"letter":"A","text":"AWS Service Control Policies (SCPs)."},{"letter":"B","text":"AWS Artifact."},{"letter":"C","text":"AWS Budgets."},{"letter":"D","text":"AWS Acceptable Use Policy."}],"correct":["D"]},{"num":"32","text":"Which of the following security resources are available to any user for free? (Choose TWO)","options":[{"letter":"A","text":"AWS Bulletins."},{"letter":"B","text":"AWS TAM."},{"letter":"C","text":"AWS Support APl."},{"letter":"D","text":"AWS Security Blog."},{"letter":"E","text":"AWS Classroom Training."}],"correct":["A","D"]},{"num":"33","text":"How can you protect data stored on Amazon S3 from accidental deletion?","options":[{"letter":"A","text":"By enabling S3 Versioning."},{"letter":"B","text":"By configuring S3 Bucket Policies."},{"letter":"C","text":"By configuring S3 Lifecycle Policies."},{"letter":"D","text":"By disabling S3 Cross-Region Replication (CRR)."}],"correct":["A"]},{"num":"34","text":"Which of the following is the responsibility of AWS according to the AWS Shared Responsibility Model?","options":[{"letter":"A","text":"Securing regions and edge locations."},{"letter":"B","text":"Performing auditing tasks."},{"letter":"C","text":"Monitoring AWS resources usage."},{"letter":"D","text":"Securing access to AWS resources."}],"correct":["A"]},{"num":"35","text":"Which of the following AWS support plans provides access to only the seven core AWS Trusted Advisor checks?","options":[{"letter":"A","text":"Business & Enterprise Support."},{"letter":"B","text":"Basic & Developer Support."},{"letter":"C","text":"Developer & Enterprise Support."},{"letter":"D","text":"Developer & Business Support."}],"correct":["B"]},{"num":"36","text":"Which of the following is NOT a benefit of using AWS Lambda?","options":[{"letter":"A","text":"AWS Lambda runs code without provisioning or managing servers."},{"letter":"B","text":"AWS Lambda provides resizable compute capacity in the cloud."},{"letter":"C","text":"There is no charge when your AWS Lambda code is not running."},{"letter":"D","text":"AWS Lambda can be called directly from any mobile app."}],"correct":["D"]},{"num":"37","text":"How does AWS help customers achieve compliance in the cloud?","options":[{"letter":"A","text":"It's not possible to meet regulatory compliance requirements in the Cloud."},{"letter":"B","text":"AWS applies the most common Cloud security standards, and is responsible for complying with customers’ applicable laws and regulations."},{"letter":"C","text":"AWS has many common assurance certifications such as ISO 9001 and HIPAA."},{"letter":"D","text":"Many AWS services are assessed regularly to comply with local laws and regulations."}],"correct":["C"]},{"num":"38","text":"Who is responsible for scaling a DynamoDB database in the AWS Shared Responsibility Model?","options":[{"letter":"A","text":"Your security team."},{"letter":"B","text":"Your development team."},{"letter":"C","text":"AWS."},{"letter":"D","text":"Your internal DevOps team."}],"correct":["C"]},{"num":"39","text":"You are working as a web app developer. You are currently facing issues in media playback for mobile devices because your media format is not supported. Which of the following AWS services can help you convert your media into another format?","options":[{"letter":"A","text":"Amazon Elastic Transcoder."},{"letter":"B","text":"Amazon Pinpoint."},{"letter":"C","text":"AmazonS3."},{"letter":"D","text":"Amazon Rekognition."}],"correct":["A"]},{"num":"40","text":"What are the benefits of the AWS Organizations service? (Choose TWO)","options":[{"letter":"A","text":"Control access to AWS services."},{"letter":"B","text":"Help organizations design and maintain an accelerated path to successful cloud adoption."},{"letter":"C","text":"Manage your organization’s payment methods."},{"letter":"D","text":"Help organization achieve their desired business outcomes with AWS."},{"letter":"E","text":"Consolidate billing across multiple AWS accounts."}],"correct":["A","E"]},{"num":"41","text":"Which AWS service allows you to build a data warehouse in the cloud?","options":[{"letter":"A","text":"AWS Shield."},{"letter":"B","text":"Amazon Redshift."},{"letter":"C","text":"Amazon RDS."},{"letter":"D","text":"Amazon Comprehend."}],"correct":["B"]},{"num":"42","text":"What AWS service allows you to buy third-party software solutions and services that run on AWS resources?","options":[{"letter":"A","text":"AWS Application Discovery service."},{"letter":"B","text":"Amazon DevPay."},{"letter":"C","text":"AWS Marketplace."},{"letter":"D","text":"Resource Groups."}],"correct":["C"]},{"num":"43","text":"Which of the following services is an AWS repository management system that allows for storing, versioning, and managing your application code?","options":[{"letter":"A","text":"AWS CodePipeline."},{"letter":"B","text":"AWS CodeCommit."},{"letter":"C","text":"AWS X-Ray."},{"letter":"D","text":"Amazon Inspector."}],"correct":["B"]},{"num":"44","text":"Which AWS service can be used to route end users to the nearest AWS Region to reduce latency?","options":[{"letter":"A","text":"Amazon Cognito."},{"letter":"B","text":"AWS Systems Manager."},{"letter":"C","text":"AWS Cloud9."},{"letter":"D","text":"Amazon Route 53."}],"correct":["D"]},{"num":"45","text":"Which feature enables users to sign into their AWS accounts with their existing corporate credentials?","options":[{"letter":"A","text":"Federation."},{"letter":"B","text":"Access keys."},{"letter":"C","text":"IAM Permissions."},{"letter":"D","text":"WAF rules."}],"correct":["A"]},{"num":"46","text":"According to the AWS shared responsibility model, what are the controls that customers fully inherit from AWS? (Choose TWO)","options":[{"letter":"A","text":"Awareness and Training."},{"letter":"B","text":"Communications controls."},{"letter":"C","text":"Data center security controls."},{"letter":"D","text":"Environmental controls."},{"letter":"E","text":"Resource Configuration Management."}],"correct":["C","D"]},{"num":"47","text":"What can you access by visiting the URL: <http://status.aws.amazon.com>?","options":[{"letter":"A","text":"AWS Billing Dashboard."},{"letter":"B","text":"AWS Cost Dashboard."},{"letter":"C","text":"AWS Service Health Dashboard."},{"letter":"D","text":"AWS Security Dashboard."}],"correct":["C"]},{"num":"48","text":"Which of the following procedures can reduce latency when your end users are retrieving data? (Choose TWO)","options":[{"letter":"A","text":"Store media assets in the region closest to your end users."},{"letter":"B","text":"Store media assets on an additional EBS volume and increase the capacity of your server."},{"letter":"C","text":"Replicate media assets to at least two availability zones."},{"letter":"D","text":"Reduce the size of media assets using the Amazon Elastic Transcoder."},{"letter":"E","text":"Store media assets in S3 and use CloudFront to distribute these assets."}],"correct":["A","E"]},{"num":"49","text":"Which of the following are part of the seven design principles for security in the cloud? (Choose TWO)","options":[{"letter":"A","text":"Use manual monitoring techniques to protect your AWS resources."},{"letter":"B","text":"Use IAM roles to grant temporary access instead of long-term credentials."},{"letter":"C","text":"Scale horizontally to protect from failures."},{"letter":"D","text":"Enable real-time traceability."},{"letter":"E","text":"Never store sensitive data in the cloud."}],"correct":["B","D"]},{"num":"50","text":"A company is migrating production workloads to AWS, and they are concerned about cost management across different departments. Which option should the company implement to categorize and track AWS spending?","options":[{"letter":"A","text":"Use the AWS Pricing Calculator service to monitor the costs incurred by each department."},{"letter":"B","text":"Use Amazon Aurora to forecast AWS spending based on usage."},{"letter":"C","text":"Apply cost allocation tags to segment AWS costs by different e projects and departments."},{"letter":"D","text":"Configure AWS Price List API to receive billing updates for each department automatically."}],"correct":["C"]}];
        let currentQuestion = 0, userAnswers = {}, flaggedQuestions = new Set(), questionRevealed = {}, examSubmitted = false, startTime = Date.now(), timerInterval, pendingNavigation = null;

        function initExam() { startTimer(); showQuestion(0); }
        function startTimer() {
            timerInterval = setInterval(() => {
                if (!examSubmitted) {
                    const elapsed = Math.floor((Date.now() - startTime) / 1000), mins = Math.floor(elapsed / 60), secs = elapsed % 60;
                    document.getElementById('timer').textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                }
            }, 1000);
        }
        function updateProgress() {
            const answered = Object.keys(userAnswers).filter(k => userAnswers[k].length > 0).length;
            const percentage = (answered / questions.length) * 100;
            document.getElementById('progress-fill').style.width = percentage + '%';
            document.getElementById('progress-text').textContent = `${answered} of ${questions.length} answered`;
        }
        function showQuestion(index) {
            currentQuestion = index;
            const q = questions[index], isMultiple = q.correct.length > 1, inputType = isMultiple ? 'checkbox' : 'radio';
            const userAns = userAnswers[index] || [];
            const showAnswer = questionRevealed[index] || false;
            
            document.getElementById('question-container').innerHTML = `
                <div class="question">
                    <div class="question-header">
                        <div class="question-text">Question ${index + 1} of ${questions.length}${isMultiple ? ' (Choose ' + q.correct.length + ')' : ''}</div>
                        <button class="flag-btn ${flaggedQuestions.has(index) ? 'flagged' : ''}" onclick="toggleFlag()">${flaggedQuestions.has(index) ? '🚩 Flagged' : '🏳️ Flag'}</button>
                    </div>
                    <div class="question-text" style="margin-bottom: 20px;">${q.text}</div>
                    ${q.options.map(opt => {
                        const isUserAnswer = userAns.includes(opt.letter);
                        const isCorrectAnswer = q.correct.includes(opt.letter);
                        let optClass = 'option';
                        if (showAnswer) {
                            if (isCorrectAnswer) optClass += ' correct';
                            else if (isUserAnswer) optClass += ' incorrect';
                        }
                        return `<label class="${optClass}" id="opt-${opt.letter}">
                            <input type="${inputType}" name="answer" value="${opt.letter}" 
                                ${isUserAnswer ? 'checked' : ''} 
                                ${showAnswer ? 'disabled' : ''}
                                onchange="selectOption('${opt.letter}', this.checked)">
                            <span><strong>${opt.letter}.</strong> ${opt.text}${showAnswer && isCorrectAnswer ? ' ✓' : ''}</span>
                        </label>`;
                    }).join('')}
                    ${showAnswer ? `<div style="margin-top: 15px; padding: 12px; background: #f8f9fa; border-radius: 4px; border-left: 4px solid #0073bb;">
                        <strong>Your answer:</strong> ${userAns.length > 0 ? userAns.join(', ') : 'Not answered'}<br>
                        <strong>Correct answer:</strong> ${q.correct.join(', ')}
                    </div>` : ''}
                </div>`;
            document.getElementById('prev-btn').disabled = index === 0;
            document.getElementById('next-btn').classList.toggle('hidden', index === questions.length - 1);
            document.getElementById('submit-btn').classList.toggle('hidden', index !== questions.length - 1);
            updateProgress();
        }
        function selectOption(letter, checked) {
            const q = questions[currentQuestion], isMultiple = q.correct.length > 1;
            if (!userAnswers[currentQuestion]) userAnswers[currentQuestion] = [];
            
            if (isMultiple) {
                if (checked) {
                    if (userAnswers[currentQuestion].length >= q.correct.length && !userAnswers[currentQuestion].includes(letter)) {
                        event.target.checked = false;
                        alert(`You can only select ${q.correct.length} options for this question.`);
                        return;
                    }
                    if (!userAnswers[currentQuestion].includes(letter)) userAnswers[currentQuestion].push(letter);
                } else {
                    userAnswers[currentQuestion] = userAnswers[currentQuestion].filter(a => a !== letter);
                }
            } else {
                // For single choice, allow deselecting by clicking the same option
                if (userAnswers[currentQuestion].includes(letter)) {
                    userAnswers[currentQuestion] = [];
                    event.target.checked = false;
                } else {
                    userAnswers[currentQuestion] = [letter];
                }
            }
            updateProgress();
        }
        function toggleFlag() { flaggedQuestions.has(currentQuestion) ? flaggedQuestions.delete(currentQuestion) : flaggedQuestions.add(currentQuestion); showQuestion(currentQuestion); }
        function showAnswerModal(isCorrect, userAns, correctAns, questionIndex) {
            const modal = document.getElementById('answerModal');
            const header = document.getElementById('modal-header');
            const body = document.getElementById('modal-body');
            const q = questions[questionIndex];
            
            // Get full text for answers
            const userAnswerText = userAns.map(letter => {
                const opt = q.options.find(o => o.letter === letter);
                return opt ? `<strong>${letter}.</strong> ${opt.text}` : letter;
            }).join('<br>');
            
            const correctAnswerText = correctAns.map(letter => {
                const opt = q.options.find(o => o.letter === letter);
                return opt ? `<strong>${letter}.</strong> ${opt.text}` : letter;
            }).join('<br>');
            
            if (isCorrect) {
                header.className = 'modal-header modal-correct';
                header.innerHTML = '✓ Correct!';
                body.innerHTML = `<p style="margin-bottom: 10px;">Your answer is correct:</p><div style="padding: 10px; background: #d4edda; border-radius: 4px; border-left: 4px solid #28a745;">${userAnswerText}</div>`;
            } else {
                header.className = 'modal-header modal-incorrect';
                header.innerHTML = '✗ Incorrect';
                body.innerHTML = `
                    <p style="margin-bottom: 10px;"><strong>Your answer:</strong></p>
                    <div style="padding: 10px; background: #f8d7da; border-radius: 4px; border-left: 4px solid #dc3545; margin-bottom: 15px;">${userAns.length > 0 ? userAnswerText : 'Not answered'}</div>
                    <p style="margin-bottom: 10px;"><strong>Correct answer:</strong></p>
                    <div style="padding: 10px; background: #d4edda; border-radius: 4px; border-left: 4px solid #28a745;">${correctAnswerText}</div>
                `;
            }
            
            modal.style.display = 'block';
        }
        function closeModal() {
            document.getElementById('answerModal').style.display = 'none';
            if (pendingNavigation !== null) {
                currentQuestion = pendingNavigation;
                pendingNavigation = null;
                showQuestion(currentQuestion);
            }
        }
        function goToQuestion(index) { 
            const userAns = userAnswers[currentQuestion] || [];
            if (userAns.length > 0 && index !== currentQuestion) {
                const q = questions[currentQuestion];
                const correctAns = q.correct;
                const isCorrect = userAns.length === correctAns.length && userAns.every(a => correctAns.includes(a));
                questionRevealed[currentQuestion] = true;
                pendingNavigation = index;
                showAnswerModal(isCorrect, userAns, correctAns, currentQuestion);
            } else {
                showQuestion(index);
            }
        }
        function nextQuestion() { 
            if (currentQuestion < questions.length - 1) { 
                const userAns = userAnswers[currentQuestion] || [];
                if (userAns.length > 0) {
                    const q = questions[currentQuestion];
                    const correctAns = q.correct;
                    const isCorrect = userAns.length === correctAns.length && userAns.every(a => correctAns.includes(a));
                    questionRevealed[currentQuestion] = true;
                    pendingNavigation = currentQuestion + 1;
                    showAnswerModal(isCorrect, userAns, correctAns, currentQuestion);
                } else {
                    currentQuestion++; 
                    showQuestion(currentQuestion);
                }
            } 
        }
        function prevQuestion() { 
            if (currentQuestion > 0) { 
                const userAns = userAnswers[currentQuestion] || [];
                if (userAns.length > 0) {
                    const q = questions[currentQuestion];
                    const correctAns = q.correct;
                    const isCorrect = userAns.length === correctAns.length && userAns.every(a => correctAns.includes(a));
                    questionRevealed[currentQuestion] = true;
                    pendingNavigation = currentQuestion - 1;
                    showAnswerModal(isCorrect, userAns, correctAns, currentQuestion);
                } else {
                    currentQuestion--; 
                    showQuestion(currentQuestion);
                }
            } 
        }
        function confirmSubmit() {
            const answered = Object.keys(userAnswers).filter(k => userAnswers[k].length > 0).length, unanswered = questions.length - answered;
            if (unanswered > 0 && !confirm(`You have ${unanswered} unanswered question(s). Do you want to submit anyway?`)) return;
            submitExam();
        }
        function submitExam() {
            examSubmitted = true; clearInterval(timerInterval);
            let correct = 0, incorrect = 0, unanswered = 0;
            questions.forEach((q, i) => {
                const userAns = userAnswers[i] || [], correctAns = q.correct;
                if (userAns.length === 0) unanswered++;
                else if (userAns.length === correctAns.length && userAns.every(a => correctAns.includes(a))) correct++;
                else incorrect++;
            });
            const percentage = (correct / questions.length * 100).toFixed(1), passed = percentage >= 70;
            const elapsed = Math.floor((Date.now() - startTime) / 1000), mins = Math.floor(elapsed / 60), secs = elapsed % 60;
            document.getElementById('exam-view').classList.add('hidden');
            document.getElementById('results-view').classList.remove('hidden');
            document.getElementById('score-display').innerHTML = `Score: ${correct}/${questions.length} (${percentage}%)`;
            document.getElementById('pass-status').innerHTML = `<div class="score ${passed ? 'pass' : 'fail'}">${passed ? '✓ PASSED' : '✗ FAILED'}</div>`;
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('incorrect-count').textContent = incorrect;
            document.getElementById('unanswered-count').textContent = unanswered;
            document.getElementById('time-taken').innerHTML = `<strong>Time taken:</strong> ${mins}m ${secs}s`;
        }
        function reviewAnswers() {
            document.getElementById('all-questions').innerHTML = questions.map((q, i) => {
                const userAns = userAnswers[i] || [], correctAns = q.correct;
                const isCorrect = userAns.length === correctAns.length && userAns.every(a => correctAns.includes(a)), isUnanswered = userAns.length === 0;
                return `<div class="question" style="border-left: 4px solid ${isUnanswered ? '#ffc107' : isCorrect ? '#28a745' : '#dc3545'}; padding-left: 15px; margin-bottom: 30px;">
                    <div class="question-text">Question ${i + 1}: ${q.text}</div>
                    ${q.options.map(opt => {
                        const isUserAnswer = userAns.includes(opt.letter), isCorrectAnswer = correctAns.includes(opt.letter);
                        let className = 'option';
                        if (isCorrectAnswer) className += ' correct';
                        else if (isUserAnswer) className += ' incorrect';
                        return `<div class="${className}"><strong>${opt.letter}.</strong> ${opt.text} ${isCorrectAnswer ? '✓' : ''}</div>`;
                    }).join('')}
                    <div style="margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 4px;">
                        <strong>Your answer:</strong> ${userAns.length > 0 ? userAns.join(', ') : 'Not answered'}<br>
                        <strong>Correct answer:</strong> ${correctAns.join(', ')}
                    </div></div>`;
            }).join('');
            document.getElementById('results-view').classList.add('hidden');
            document.getElementById('review-view').classList.remove('hidden');
        }
        function backToResults() { document.getElementById('review-view').classList.add('hidden'); document.getElementById('results-view').classList.remove('hidden'); }
        function restartExam() {
            currentQuestion = 0; userAnswers = {}; flaggedQuestions.clear(); questionRevealed = {}; examSubmitted = false; startTime = Date.now(); clearInterval(timerInterval);
            document.getElementById('results-view').classList.add('hidden'); document.getElementById('review-view').classList.add('hidden'); document.getElementById('exam-view').classList.remove('hidden');
            initExam();
        }
        initExam();
    </script>
</body>
</html>
